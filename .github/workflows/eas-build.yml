name: Expo Go — Publier mise à jour

on:
  push:
    branches:
      - main

jobs:
  update:
    name: Publier sur Expo Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dépendances
        run: npm install

      - name: Nettoyer le cache NativeWind
        run: find node_modules -path "*react-native-css-interop/.cache" -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Installer EAS CLI
        run: npm install -g eas-cli

      - name: Publier la mise à jour Expo Go
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_BUILD_NO_EXPO_GO_WARNING: "true"
        run: eas update --branch main --message "Mise à jour automatique depuis GitHub" --non-interactive
